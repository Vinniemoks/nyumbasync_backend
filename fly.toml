# Fly.io config for the NyumbaSync backend API.
# Region: jnb (Johannesburg) — closest Fly region to Kenya.
app = "nyumbasync-api"
primary_region = "jnb"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  CLUSTER_MODE = "false"
  BCRYPT_ROUNDS = "12"
  LOG_LEVEL = "info"
  RATE_LIMIT_WINDOW = "900000"
  RATE_LIMIT_MAX_REQUESTS = "300"
  MAX_FILE_SIZE = "10485760"
  # Zoho Mail SMTP defaults (non-sensitive). Set EMAIL_USER and EMAIL_PASSWORD
  # via `flyctl secrets set` to activate outbound email.
  EMAIL_FROM = "support@nyumbasync.co.ke"
  EMAIL_HOST = "smtp.zoho.com"
  EMAIL_PORT = "587"
  EMAIL_SECURE = "false"
  EMAIL_USER = "support@nyumbasync.co.ke"
  # All generated/uploaded files live on the persistent volume (see [mounts]);
  # anything written elsewhere is lost on deploy/restart.
  UPLOAD_DIR = "/data/uploads"
  LEASE_DIR = "/data/leases"
  REPORTS_DIR = "/data/reports"

# Persistent disk for uploads, lease PDFs, and reports. Fly volumes survive
# deploys/restarts and get automatic daily snapshots.
[mounts]
  source = "nyumbasync_data"
  destination = "/data"

[http_service]
  internal_port = 3001
  force_https = true
  # Keep one machine always running — avoids cold starts for a production API.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "40s"
    method = "GET"
    path = "/health"
    # The app 301s plain-HTTP requests in production; Fly's edge adds this
    # header for real traffic, so the check must send it too to get a 200.
    [http_service.checks.headers]
      X-Forwarded-Proto = "https"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
